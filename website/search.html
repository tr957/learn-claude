<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Prompts — Claude at 1kx</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <nav>
    <a class="site-name" href="index.html">Claude at 1kx</a>
    <ul>
      <li><a href="beginner-path.html">Getting Started</a></li>
      <li><a href="everyday-use.html">Everyday Use</a></li>
      <li><a href="research-diligence.html">Research &amp; Diligence</a></li>
      <li><a href="founder-meetings.html">Founder Meetings</a></li>
      <li><a href="writing-comms.html">Writing &amp; Comms</a></li>
      <li><a href="portfolio-support.html">Portfolio Support</a></li>
      <li><a href="prompt-templates.html">Prompt Templates</a></li>
      <li><a href="safe-use.html">Safe Use</a></li>
    </ul>
    <div class="nav-search">
      <input type="search" placeholder="Search prompts…" id="nav-search-input" autocomplete="off" />
    </div>
  </nav>

  <main>
    <p class="page-category">Search</p>
    <h1>Search Prompts</h1>
    <p class="subtitle">Find any prompt across the site. Filter by role or type a keyword.</p>

    <div class="search-controls">
      <div class="search-input-wrap">
        <input
          type="text"
          id="search-input"
          placeholder="Click to browse or type a keyword…"
          autocomplete="off"
        />
        <div id="search-suggestions" class="search-suggestions"></div>
      </div>
      <div class="role-filters">
        <button class="role-filter-btn" data-role="investment">Investment &amp; Research</button>
        <button class="role-filter-btn" data-role="operations">Operations &amp; Comms</button>
        <button class="role-filter-btn" data-role="platform">Platform &amp; Portfolio</button>
      </div>
    </div>

    <div class="search-results">
      <p class="search-status" id="search-status"></p>
      <div id="results-container"></div>
    </div>
  </main>

  <script src="search-data.js"></script>
  <script>
    function escapeHtml(str) {
      return str
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#039;');
    }

    function hideDropdown() {
      suggestionsEl.style.display = 'none';
    }

    function showDropdown() {
      suggestionsEl.style.display = 'block';
    }

    var searchInput = document.getElementById('search-input');
    var navInput = document.getElementById('nav-search-input');
    var statusEl = document.getElementById('search-status');
    var container = document.getElementById('results-container');
    var roleButtons = document.querySelectorAll('.role-filter-btn');
    var suggestionsEl = document.getElementById('search-suggestions');

    var activeRoles = new Set();
    var allLabels = SEARCH_DATA.map(function(item) {
      return { label: item.label, pageName: item.pageName };
    });

    function showSuggestions(query) {
      var q = query.trim().toLowerCase();
      var matches = q
        ? allLabels.filter(function(s) {
            return s.label.toLowerCase().indexOf(q) !== -1 || s.pageName.toLowerCase().indexOf(q) !== -1;
          })
        : allLabels;

      if (matches.length === 0) {
        hideDropdown();
        return;
      }

      suggestionsEl.innerHTML = matches.map(function(s) {
        return '<div class="search-suggestion-item" data-label="' + escapeHtml(s.label) + '">'
          + escapeHtml(s.label)
          + '<span class="search-suggestion-meta">' + escapeHtml(s.pageName) + '</span>'
          + '</div>';
      }).join('');

      var items = suggestionsEl.querySelectorAll('.search-suggestion-item');
      for (var i = 0; i < items.length; i++) {
        (function(item) {
          item.addEventListener('mousedown', function(e) {
            e.preventDefault();
            searchInput.value = item.getAttribute('data-label');
            hideDropdown();
            runSearch();
          });
        })(items[i]);
      }

      showDropdown();
    }

    function runSearch() {
      var query = searchInput.value.trim().toLowerCase();
      var hasQuery = query.length > 0;
      var hasRoleFilter = activeRoles.size > 0;

      var results = SEARCH_DATA.filter(function(item) {
        var matchesText = !hasQuery
          || item.label.toLowerCase().indexOf(query) !== -1
          || item.text.toLowerCase().indexOf(query) !== -1
          || item.section.toLowerCase().indexOf(query) !== -1;

        var matchesRole = !hasRoleFilter
          || item.roles.some(function(r) { return activeRoles.has(r); });

        return matchesText && matchesRole;
      });

      if (results.length === 0) {
        statusEl.textContent = '';
        container.innerHTML = '<p class="search-empty">No prompts match your search.</p>';
        return;
      }

      statusEl.textContent = (!hasQuery && !hasRoleFilter)
        ? '63 prompts — click to browse or type to filter'
        : results.length + ' prompt' + (results.length === 1 ? '' : 's') + ' found';

      container.innerHTML = results.map(function(item) {
        return '<div class="search-result-card">'
          + '<div class="search-result-meta">' + escapeHtml(item.pageName) + ' &rsaquo; ' + escapeHtml(item.section) + '</div>'
          + '<div class="search-result-label">' + escapeHtml(item.label) + '</div>'
          + '<div class="search-result-text">' + escapeHtml(item.text) + '</div>'
          + '<a class="search-result-link" href="' + escapeHtml(item.page) + '#' + escapeHtml(item.anchor) + '">View in context &rarr;</a>'
          + '</div>';
      }).join('');
    }

    // Show dropdown on click/focus
    searchInput.addEventListener('focus', function() {
      showSuggestions(searchInput.value);
    });

    searchInput.addEventListener('click', function() {
      showSuggestions(searchInput.value);
    });

    // Filter as you type
    searchInput.addEventListener('input', function() {
      runSearch();
      showSuggestions(searchInput.value);
    });

    // Close dropdown when clicking outside
    document.addEventListener('click', function(e) {
      if (!searchInput.contains(e.target) && !suggestionsEl.contains(e.target)) {
        hideDropdown();
      }
    });

    // Role filters
    for (var i = 0; i < roleButtons.length; i++) {
      (function(btn) {
        btn.addEventListener('click', function() {
          var role = btn.getAttribute('data-role');
          if (activeRoles.has(role)) {
            activeRoles.delete(role);
            btn.classList.remove('active');
          } else {
            activeRoles.add(role);
            btn.classList.add('active');
          }
          runSearch();
        });
      })(roleButtons[i]);
    }

    // Nav search
    navInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && navInput.value.trim()) {
        searchInput.value = navInput.value.trim();
        hideDropdown();
        runSearch();
        searchInput.focus();
      }
    });

    // Pre-fill from ?q= param
    var params = new URLSearchParams(window.location.search);
    var initialQuery = params.get('q') || '';
    if (initialQuery) {
      searchInput.value = initialQuery;
    }

    // Show all prompts on load
    runSearch();
  </script>

</body>
</html>
